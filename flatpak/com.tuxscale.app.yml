id: com.tuxscale.app
sdk: org.freedesktop.Sdk
runtime: org.freedesktop.Platform
runtime-version: '25.08'
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: tuxscale-run
separate-locales: false

finish-args:
  - --device=dri
  - --share=ipc
  - --filesystem=home
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

modules:
  - name: zypak
    sources:
      - type: git
        url: https://github.com/refi64/zypak
        tag: v2025.09
        commit: 693a71c5ffa80ec9c9ce2ae03b1ccc493c698e53
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: tuxscale
    buildsystem: simple
    sources:
      - type: file
        only-arches:
          - x86_64
        url: https://github.com/rifat/tuxscale/releases/download/v1.0.0/tuxscale-1.0.0-linux-x64.zip
        sha256: PLACEHOLDER
        x-checker-data:
          type: json
          url: https://api.github.com/repos/rifat/tuxscale/releases/latest
          tag-query: .tag_name
          version-query: $tag | sub("^v"; "")
          timestamp-query: .published_at
          url-query: '"https://github.com/rifat/tuxscale/releases/download/v" + $version + "/tuxscale-" + $version + "-linux-x64.zip"'
        dest-filename: tuxscale-linux.zip
      - type: file
        path: com.tuxscale.app.metainfo.xml
      - type: script
        dest-filename: tuxscale-run
        commands:
          - zypak-wrapper /app/tuxscale/tuxscale --ozone-platform-hint=auto --enable-features=WaylandWindowDecorations
    build-commands:
      - install -d /app/tuxscale
      - unzip tuxscale-linux.zip -d /app/tuxscale
      - install tuxscale-run /app/bin/
      - install -Dm644 /app/tuxscale/resources/512x512.png /app/share/icons/hicolor/512x512/apps/com.tuxscale.app.png
      - install -Dm644 /app/tuxscale/resources/128x128.png /app/share/icons/hicolor/128x128/apps/com.tuxscale.app.png
      - install -Dp -m644 com.tuxscale.app.metainfo.xml /app/share/metainfo/com.tuxscale.app.metainfo.xml
      - touch com.tuxscale.app.desktop
      - desktop-file-edit --set-key=Exec --set-value="tuxscale-run %U" \
                          --set-key=Icon --set-value=com.tuxscale.app \
                          --set-key=Comment --set-value="Video upscaling application" \
                          --set-key=Name --set-value="TuxScale" \
                          --set-key=StartupNotify --set-value=false \
                          --set-key=Categories --set-value="AudioVideo;Video;" \
                          --set-key=Type --set-value=Application \
                          com.tuxscale.app.desktop
      - install -Dm644 com.tuxscale.app.desktop /app/share/applications/com.tuxscale.app.desktop
